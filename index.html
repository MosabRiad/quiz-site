<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>قريباً انطلاق الموقع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

height:100vh;

background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
}

.container{

width:90%;
max-width:700px;

padding:45px;

text-align:center;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.15);

border-radius:30px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.logo{

font-size:70px;

margin-bottom:15px;

animation:float 3s infinite ease-in-out;

}

h1{

font-size:42px;

color:#fff;

margin-bottom:10px;

}

.subtitle{

font-size:22px;

color:#dbeafe;

margin-bottom:35px;

}

.countdown{

display:flex;

justify-content:center;

gap:18px;

flex-wrap:wrap;

margin-bottom:35px;

}

.box{

width:110px;

padding:20px;

background:rgba(255,255,255,.12);

border-radius:20px;

}

.box span{

display:block;

font-size:42px;

font-weight:900;

color:#fff;

}

.box small{

font-size:16px;

color:#cbd5e1;

}

.message{

font-size:18px;

color:#fff;

line-height:1.9;

margin-bottom:35px;

}

footer{

font-size:16px;

color:#94a3b8;

}

footer b{

color:#fff;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

@media(max-width:600px){

h1{

font-size:30px;

}

.subtitle{

font-size:18px;

}

.box{

width:90px;

}

.box span{

font-size:32px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">🚀</div>

<h1>قريباً انطلاق الموقع</h1>

<div class="subtitle">

انتظرونا بمفاجآت عديدة ومميزة

</div>

<div class="countdown">

<div class="box">

<span id="days">0</span>

<small>يوم</small>

</div>

<div class="box">

<span id="hours">0</span>

<small>ساعة</small>

</div>

<div class="box">

<span id="minutes">0</span>

<small>دقيقة</small>

</div>

<div class="box">

<span id="seconds">0</span>

<small>ثانية</small>

</div>

</div>

<div class="message">

نعمل حالياً على تجهيز تجربة جديدة ومميزة لكم ❤️<br>

ترقبوا الإطلاق الرسمي خلال أيام قليلة.

</div>

<footer>

جميع الحقوق محفوظة © <b>مصعب الدريملي</b>

</footer>

</div>

<script>

const targetDate = new Date();

targetDate.setDate(targetDate.getDate()+3);

function updateCountdown(){

const now = new Date();

const diff = targetDate - now;

if(diff <=0){

document.querySelector(".countdown").innerHTML="<h2 style='color:white'>تم الانطلاق 🎉</h2>";

return;

}

const days=Math.floor(diff/(1000*60*60*24));

const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const minutes=Math.floor((diff%(1000*60*60))/(1000*60));

const seconds=Math.floor((diff%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

}

updateCountdown();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
